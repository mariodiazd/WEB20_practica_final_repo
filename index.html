<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KCFLIX - Inicio de sesión</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="nav">
      <div class="logo">KCFLIX</div>
    </header>

    <main class="panel">
      <h1>Introduce la información<br>para iniciar sesión</h1>
      <p class="sub">O empieza con una cuenta nueva.</p>

      <form class="form">
        <label class="field">
          <span class="label">Correo o número de móvil</span>
          <input type="email" placeholder="mariodiazdiestro@gmail.com" value="mariodiazdiestro@gmail.com" aria-label="Correo o número de móvil">
        </label>
        <a class="btn-primary" href="main.html">Continuar</a>
      </form>

      <button type="button" class="help">
        Obtener ayuda
        <span class="chevron">⌄</span>
      </button>

      <p class="recaptcha">Esta página utiliza Google reCAPTCHA para garantizar que no eres un robot.</p>
    </main>
  </div>
</body>
</html>
